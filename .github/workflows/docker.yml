name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  VCPKG_BUILD_TYPE: release

jobs:
  # ── Compile awsmock-lrt inside an Alpine builder image ────────────────────────
  build:
    name: Build binary
    runs-on: ubuntu-24.04
    steps:
      - name: Check out awsmock-lrt
        uses: actions/checkout@v4

      - name: Get awsmock HEAD revision
        id: awsmock-rev
        run: echo "sha=$(git ls-remote https://github.com/jensvogt/awsmock.git HEAD | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build entirely inside Alpine so the binary links against musl, matching
      # the Alpine-based runtime images.  Docker layer cache (type=gha) avoids
      # recompiling vcpkg packages on every run; AWSMOCK_REV busts that cache
      # whenever the awsmock dependency changes.
      - name: Build binary in Alpine builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.builder
          load: true
          tags: awsmock-lrt-builder:latest
          build-args: |
            AWSMOCK_REV=${{ steps.awsmock-rev.outputs.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: Extract binary from builder image
        run: |
          docker create --name builder-tmp awsmock-lrt-builder:latest sh
          mkdir -p cmake-build-release
          docker cp builder-tmp:/build/awsmock-lrt/cmake-build-release/awsmock-lrt cmake-build-release/awsmock-lrt
          docker rm builder-tmp

      - uses: actions/upload-artifact@v4
        with:
          name: awsmock-lrt
          path: cmake-build-release/awsmock-lrt
          retention-days: 1

  # ── Build and push one image per runtime ──────────────────────────────────────
  docker:
    name: Docker (${{ matrix.runtime }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: java21
            dockerfile: docker/Dockerfile.java21
          - runtime: java25
            dockerfile: docker/Dockerfile.java25
          - runtime: nodejs20
            dockerfile: docker/Dockerfile.nodejs20
          - runtime: nodejs22
            dockerfile: docker/Dockerfile.nodejs22
          - runtime: nodejs24
            dockerfile: docker/Dockerfile.nodejs24
          - runtime: python312
            dockerfile: docker/Dockerfile.python312
          - runtime: provided
            dockerfile: docker/Dockerfile.provided

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: awsmock-lrt
          path: cmake-build-release/

      - run: chmod +x cmake-build-release/awsmock-lrt

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/awsmock-grt
          tags: |
            type=raw,value=${{ matrix.runtime }},enable={{is_default_branch}}
            type=semver,pattern={{version}},suffix=-${{ matrix.runtime }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.runtime }}
            type=ref,event=pr,suffix=-${{ matrix.runtime }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.runtime }}
          cache-to: type=gha,mode=max,scope=${{ matrix.runtime }}
